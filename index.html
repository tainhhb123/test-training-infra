<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(360px, calc(100% - 32px));
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin-top: 0;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input,
      button {
        font: inherit;
        padding: 10px 12px;
        border-radius: 8px;
      }

      input {
        border: 1px solid #cbd5e1;
      }

      button {
        border: 0;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
      }

      #message {
        min-height: 1.5em;
        margin-top: 12px;
        font-weight: 600;
      }

      #message.error {
        color: #b91c1c;
      }

      #message.success {
        color: #15803d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Login</h1>
      <form id="login-form">
        <label>
          Username
          <input id="username" name="username" type="text" autocomplete="username" />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" />
        </label>
        <button type="submit">Sign in</button>
      </form>
      <p id="message" aria-live="polite"></p>
    </main>
    <script src="./src/login.js"></script>
  </body>
</html>
